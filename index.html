        async function showRecords(period) {

            const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - 7);

                let correctCount = 0;
                for(const ev of Object.values(events)) {
                    if(!ev.correct) continue;
                    if(period === "today" && ev.timestamp >= dayStart.getTime()) correctCount++;
                    else if(period === "week" && ev.timestamp >= weekStart.getTime()) correctCount++;
                    else if(period === "month" && ev.timestamp >= monthStart.getTime()) correctCount++;
                }
                if(correctCount > 0) records.push({ name: info.name, correct: correctCount, emoji: info.emoji || "😊" });
            }
            records.sort((a,b) => b.correct - a.correct);
            let html = `<div class="records-list">`;
            for(let i=0; i<Math.min(10, records.length); i++) {
                const medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
                html += `<div class="record-item"><span>${medal} ${records[i].emoji} ${escapeHtml(records[i].name)}</span><span>✅ ${records[i].correct}</span></div>`;
            }

            html += `</div>`;

            recordsPanel.classList.remove("hidden");

        function renderDragStudent(task) { const questionTemplate = task.question; const options = task.options; const correctAnswers = task.correctAnswers; const totalBlanks = (questionTemplate.match(/___/g)||[]).length; if(totalBlanks===0) { taskBody.innerHTML=`<div class="error-message">⚠️ Хатогӣ: ҷои хол (___) нест.</div>`; return; } if(currentFilledAnswers.length!==totalBlanks) currentFilledAnswers = new Array(totalBlanks).fill(null); const renderUI = ()=>{ let displayText=questionTemplate; let blankIndex=0; displayText=displayText.replace(/___/g,()=>{ const filled=currentFilledAnswers[blankIndex]; const res = filled ? `<span class="filled-blank">${escapeHtml(filled)}</span>` : `<span class="empty-blank">___</span>`; blankIndex++; return res; }); let optsHtml=`<div class="drag-options-title"><i class="fas fa-arrows-alt"></i> Вариантҳо:</div><div class="drag-options-grid">`; options.forEach(opt=>{ optsHtml+=`<div class="drag-option" data-value="${escapeHtml(opt)}">${escapeHtml(opt)}</div>`; }); optsHtml+=`</div>`; const filledCount=currentFilledAnswers.filter(v=>v!==null).length; if(filledCount===totalBlanks) optsHtml+=`<button id="checkDragBtn" class="check-drag-btn"><i class="fas fa-check"></i> Санҷидан</button>`; else optsHtml+=`<div class="progress-hint"><i class="fas fa-info-circle"></i> Пур шуда: ${filledCount} аз ${totalBlanks}</div>`; taskBody.innerHTML=`<div class="drag-question-text">${displayText}</div>${optsHtml}`; document.querySelectorAll(".drag-option").forEach(opt=>{ opt.addEventListener("click",async ()=>{ if(blockAnswer) return; const firstEmpty=currentFilledAnswers.findIndex(v=>v===null); if(firstEmpty===-1) { showToast("Ҳама ҷойҳо пур шудаанд!","info"); return; } currentFilledAnswers[firstEmpty]=opt.dataset.value; renderUI(); if(currentFilledAnswers.every(v=>v!==null)) { document.getElementById("checkDragBtn")?.addEventListener("click",async ()=>{ if(blockAnswer) return; const isCorrect=currentFilledAnswers.every((v,i)=>v===correctAnswers[i])         function renderCodeStudent(task) { const expected=normalizeCode(task.expectedCode||""); taskBody.innerHTML=`<div class="code-question"><i class="fas fa-code"></i> ${escapeHtml(task.codeQuestion)}</div><textarea id="codeInputArea" class="code-textarea" rows="6" placeholder="Коди худро ворид кунед..."></textarea><button id="checkCodeBtn" class="check-code-btn"><i class="fas fa-check-circle"></i> Санҷидан</button>`; const btn=document.getElementById("checkCodeBtn"); const ta=document.getElementById("codeInputArea"); btn?.addEventListener("click",async ()=>{ if(blockAnswer) return; const isCorrect=(normalizeCode(ta.value)===expected); if(isCorrect) btn.classList.add("correct-pulse"); else btn.classList.add("wrong-pulse"); setTimeout(async ()=>{ if(isCorrect) { await updateStats(true, task.title); await handleCorrect(btn); } else { await updateStats(false, task.title); await handleWrong(btn); } btn.classList.remove("correct-pulse","wrong-pulse"); },300); }); }
        
        async function handleCorrect(active) { if(blockAnswer) return; blockAnswer=true; await set(ref(db, `completed_group${currentGroup}/${currentStudentId}/${currentTask.id}`), { completedAt: Date.now() }); availableTasks = availableTasks.filter(t=>t.id!==currentTask.id); setTimeout(async ()=>{ blockAnswer=false; mistakeOnCurrent=false; currentFilledAnswers=[]; if(availableTasks.length===0) await loadStudentTasks(); else { currentIndex=0; mistakeOnCurrent=false; renderCurrentTask(); if(taskCounterSpan) taskCounterSpan.textContent=availableTasks.length; } },500); }

        <button id="changePasswordBtn" class="btn-icon" style="background:#4b5563; margin-top:10px;"><i class="fas fa-key"></i> Тағйири пароли админ</button>
        <div id="tasksListAdmin" style="margin-top:20px;"></div>
        <div id="adminStats" style="margin-top:20px;"></div>
        <div id="adminShop" style="margin-top:20px;"></div>
    </div>
</div>

<div id="profilePanel" class="profile-overlay hidden"><div class="profile-card"><button id="closeProfileBtn" class="close-icon"><i class="fas fa-times"></i></button><h3><i class="fas fa-user-circle"></i> Кабинети шахсӣ</h3><p><strong><i class="fas fa-user"></i> Ном:</strong> <span id="profileName"></span> <span id="profileEmoji" style="font-size:1.3rem;"></span></p><p><strong><i class="fas fa-key"></i> Коди барқарорсозӣ:</strong></p><div class="recovery-code" id="profileRecoveryCode"></div><div id="profileStats"></div><div class="restore-section"><input type="text" id="restoreCodeInput" placeholder="Коди барқарорсозиро ворид кунед"><button id="restoreAccountBtn" class="profile-btn-small"><i class="fas fa-undo"></i> Барқарор кардани аккаунт</button></div><button id="changeNameBtn" class="profile-btn-small"><i class="fas fa-pen"></i> Тағйири ном (пешрафт нест мешавад)</button><div id="achievementsContainer"></div></div></div>

<div id="shopPanel" class="shop-overlay hidden"><div class="shop-card"><button id="closeShopBtn" class="close-icon"><i class="fas fa-times"></i></button><h3><i class="fas fa-store"></i> Магазин</h3><p><i class="fas fa-coins"></i> Тангаҳои шумо: <strong id="profileCoins">0</strong></p><div id="shopItemsContainer"></div></div></div>

<div id="topPanel" class="top-overlay hidden"><div class="top-card"><button id="closeTopBtn" class="close-icon"><i class="fas fa-times"></i></button><div id="topTableContainer"></div></div></div>

<div id="recordsPanel" class="records-overlay hidden"><div class="records-card"><button id="closeRecordsBtn" class="close-icon"><i class="fas fa-times"></i></button><h3><i class="fas fa-chart-line"></i> Рекордҳо</h3><div class="records-tabs"><button id="recordsToday" class="btn-icon">Имрӯз</button><button id="recordsWeek" class="btn-icon">Ҳафта</button><button id="recordsMonth" class="btn-icon">Моҳ</button></div><div id="recordsContainer"></div></div></div>
</body>
